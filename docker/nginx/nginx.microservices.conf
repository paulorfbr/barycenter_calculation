# =============================================================================
# Nginx reverse proxy — microservices local development
#
# Routes:
#   /api/v1/*          → API Gateway (port 8080) — all REST calls
#   /sockjs-node       → Angular CLI dev server WebSocket (hot reload)
#   /                  → Angular CLI dev server (port 4200) — SPA
#
# Start with:
#   docker compose -f docker-compose.microservices.yml --profile proxy up nginx-proxy
# =============================================================================

worker_processes auto;
error_log  /var/log/nginx/error.log warn;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    log_format main '$remote_addr [$time_local] "$request" $status $body_bytes_sent rt=$request_time';
    access_log /var/log/nginx/access.log main;

    sendfile        on;
    keepalive_timeout 65;
    gzip            on;
    gzip_types      text/plain text/css application/json application/javascript;

    upstream api_gateway {
        server api-gateway:8080;
        keepalive 32;
    }

    upstream angular_dev {
        # host.docker.internal resolves to the Docker host — where `ng serve` runs
        server host.docker.internal:4200;
    }

    server {
        listen      80;
        server_name localhost;

        proxy_buffer_size       128k;
        proxy_buffers           4 256k;
        proxy_busy_buffers_size 256k;

        # ── Health ──────────────────────────────────────────────────────────
        location /nginx-health {
            return 200 'OK';
            add_header Content-Type text/plain;
        }

        # ── REST API via Gateway ─────────────────────────────────────────────
        location /api/ {
            proxy_pass         http://api_gateway;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_read_timeout 60s;
        }

        # ── Angular Webpack hot-reload WebSocket ─────────────────────────────
        location /sockjs-node {
            proxy_pass         http://angular_dev;
            proxy_http_version 1.1;
            proxy_set_header   Upgrade    $http_upgrade;
            proxy_set_header   Connection "upgrade";
        }

        # ── Angular SPA (dev server) ─────────────────────────────────────────
        location / {
            proxy_pass         http://angular_dev;
            proxy_http_version 1.1;
            proxy_set_header   Host            $host;
            proxy_set_header   X-Real-IP       $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        }
    }
}

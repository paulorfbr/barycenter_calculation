# =============================================================================
# Nginx — Local development reverse proxy configuration
#
# Forwards all traffic to the Spring Boot application on port 8080.
# Provides gzip compression and browser caching headers matching what the
# production ALB would deliver, so developers can test locally.
# =============================================================================

worker_processes auto;
error_log  /var/log/nginx/error.log warn;
pid        /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent"';
    access_log /var/log/nginx/access.log main;

    sendfile        on;
    tcp_nopush      on;
    keepalive_timeout 65;

    gzip              on;
    gzip_vary         on;
    gzip_proxied      any;
    gzip_comp_level   6;
    gzip_types text/plain text/css text/xml application/json
               application/javascript application/xml+rss
               application/atom+xml image/svg+xml;

    server {
        listen 80;
        server_name localhost;

        # Health endpoint for Docker healthcheck
        location /nginx-health {
            return 200 'OK';
            add_header Content-Type text/plain;
        }

        # Proxy everything to Spring Boot
        location / {
            proxy_pass         http://logistics-api:8080;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_read_timeout 60s;

            # Cache Angular's hashed static assets (JS/CSS chunks)
            location ~* \.(js|css|woff2?|ttf|eot|svg|png|ico)$ {
                proxy_pass http://logistics-api:8080;
                add_header Cache-Control "public, max-age=31536000, immutable";
            }

            # Never cache the SPA shell
            location = /index.html {
                proxy_pass http://logistics-api:8080;
                add_header Cache-Control "no-cache, no-store, must-revalidate";
            }
        }
    }
}

# =============================================================================
# Docker Security Configuration and Best Practices
#
# This file contains security hardening configurations for all services
# including:
#   - Security policies and constraints
#   - User namespace mappings
#   - Resource limits and quotas
#   - Network security policies
#   - Secrets management
#   - Vulnerability scanning configuration
# =============================================================================

# Security constraints for all services
x-security-defaults: &security-defaults
  user: "1001:1001"  # Non-root user
  read_only: true    # Read-only root filesystem
  cap_drop:
    - ALL           # Drop all capabilities
  cap_add:
    - CHOWN         # Only add necessary capabilities
    - SETGID
    - SETUID
  security_opt:
    - no-new-privileges:true
    - seccomp:./docker/security/seccomp-profile.json
    - apparmor:docker-default
  tmpfs:
    - /tmp:noexec,nosuid,size=100m
    - /var/tmp:noexec,nosuid,size=50m

# Resource limits for production
x-resource-limits: &resource-limits
  deploy:
    resources:
      limits:
        cpus: '1.0'
        memory: 1G
        pids: 100
      reservations:
        cpus: '0.5'
        memory: 512M
    restart_policy:
      condition: on-failure
      delay: 10s
      max_attempts: 3
      window: 60s

services:

  # ===========================================================================
  # INFRASTRUCTURE SERVICES — Security Hardening
  # ===========================================================================

  postgres:
    <<: *resource-limits
    user: "999:999"  # PostgreSQL user
    read_only: false  # Database needs write access
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - FOWNER
      - SETGID
      - SETUID
      - DAC_OVERRIDE
    security_opt:
      - no-new-privileges:true
      - label:type:container_t
    environment:
      # Security environment variables
      POSTGRES_INITDB_ARGS: "--auth-host=scram-sha-256 --auth-local=peer"
      POSTGRES_HOST_AUTH_METHOD: scram-sha-256
    volumes:
      - type: bind
        source: ./docker/security/postgres
        target: /etc/postgresql
        read_only: true
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U logistics"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
        tag: "{{.ImageName}}|{{.Name}}|{{.ImageFullID}}|{{.FullID}}"

  redis:
    <<: *resource-limits
    user: "999:999"  # Redis user
    read_only: true
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
      - label:type:container_t
    tmpfs:
      - /tmp:noexec,nosuid,size=50m
      - /var/lib/redis:noexec,nosuid,size=100m
    command: >
      redis-server
        --protected-mode yes
        --bind 0.0.0.0
        --port 6379
        --requirepass ${REDIS_PASSWORD}
        --maxmemory 256mb
        --maxmemory-policy allkeys-lru
        --save 900 1
        --save 300 10
        --save 60 10000
        --stop-writes-on-bgsave-error yes
        --rdbcompression yes
        --rdbchecksum yes
        --timeout 300
        --tcp-keepalive 60
        --maxclients 100
        --databases 1
        --rename-command FLUSHDB ""
        --rename-command FLUSHALL ""
        --rename-command DEBUG ""
        --rename-command CONFIG ""

  # ===========================================================================
  # APPLICATION SERVICES — Security Configuration
  # ===========================================================================

  api-gateway:
    <<: *security-defaults
    <<: *resource-limits
    environment:
      # Security headers and CORS configuration
      SPRING_SECURITY_HEADERS_FRAME: DENY
      SPRING_SECURITY_HEADERS_CONTENT_TYPE: nosniff
      SPRING_SECURITY_HEADERS_XSS_PROTECTION: "1; mode=block"
      SPRING_SECURITY_HEADERS_REFERRER_POLICY: strict-origin-when-cross-origin
      SPRING_SECURITY_HEADERS_HSTS: max-age=31536000; includeSubDomains; preload

      # CORS configuration
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-https://logistics.example.com}
      CORS_ALLOWED_METHODS: GET,POST,PUT,DELETE,OPTIONS
      CORS_ALLOWED_HEADERS: Accept,Authorization,Content-Type,X-Requested-With
      CORS_EXPOSED_HEADERS: X-Total-Count,X-Rate-Limit-Remaining
      CORS_ALLOW_CREDENTIALS: "false"

      # Rate limiting
      RATE_LIMIT_ENABLED: "true"
      RATE_LIMIT_CAPACITY: 1000
      RATE_LIMIT_TOKENS: 100
      RATE_LIMIT_PERIOD: PT1M

      # JWT configuration
      JWT_ISSUER: logistics-platform
      JWT_EXPIRATION: PT15M
      JWT_REFRESH_EXPIRATION: P7D

      # Actuator security
      MANAGEMENT_ENDPOINTS_WEB_EXPOSURE_INCLUDE: health,info,metrics
      MANAGEMENT_ENDPOINT_HEALTH_SHOW_DETAILS: when_authorized
      MANAGEMENT_SECURITY_ENABLED: "true"

    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8090/actuator/health | grep -q '\"status\":\"UP\"' || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  company-service:
    <<: *security-defaults
    <<: *resource-limits
    environment:
      # Database security
      SPRING_JPA_HIBERNATE_DDL_AUTO: validate
      SPRING_JPA_SHOW_SQL: "false"
      SPRING_DATASOURCE_HIKARI_MAXIMUM_POOL_SIZE: 10
      SPRING_DATASOURCE_HIKARI_MINIMUM_IDLE: 5
      SPRING_DATASOURCE_HIKARI_CONNECTION_TIMEOUT: 30000
      SPRING_DATASOURCE_HIKARI_IDLE_TIMEOUT: 300000
      SPRING_DATASOURCE_HIKARI_MAX_LIFETIME: 900000

      # Input validation
      SPRING_JPA_PROPERTIES_HIBERNATE_VALIDATOR_APPLY_TO_DDL: "false"
      SPRING_JPA_PROPERTIES_HIBERNATE_VALIDATOR_AUTO_APPLY_TO_DDL: "false"

  site-service:
    <<: *security-defaults
    <<: *resource-limits

  calculation-service:
    <<: *security-defaults
    <<: *resource-limits
    deploy:
      resources:
        limits:
          cpus: '1.5'
          memory: 1.5G
          pids: 100
        reservations:
          cpus: '0.75'
          memory: 768M

  dashboard-service:
    <<: *security-defaults
    <<: *resource-limits

  # ===========================================================================
  # MONITORING SERVICES — Security Configuration
  # ===========================================================================

  prometheus:
    <<: *resource-limits
    user: "65534:65534"  # nobody user
    read_only: true
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    tmpfs:
      - /tmp:noexec,nosuid,size=50m
    volumes:
      - type: bind
        source: ./prometheus/prometheus-secure.yml
        target: /etc/prometheus/prometheus.yml
        read_only: true
      - prometheus-data:/prometheus
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --storage.tsdb.retention.time=30d
      - --storage.tsdb.retention.size=8GB
      - --web.enable-lifecycle
      - --web.external-url=https://prometheus.logistics.internal
      - --web.enable-admin-api=false
      - --log.level=warn
      - --web.listen-address=0.0.0.0:9090
      - --storage.tsdb.wal-compression
    healthcheck:
      test: ["CMD", "promtool", "query", "instant", "localhost:9090", "up"]
      interval: 30s
      timeout: 10s
      retries: 3

  grafana:
    <<: *resource-limits
    user: "472:472"  # Grafana user
    read_only: true
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    tmpfs:
      - /tmp:noexec,nosuid,size=100m
      - /var/lib/grafana/alerting:noexec,nosuid,size=50m
    environment:
      # Security settings
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD}
      GF_SECURITY_SECRET_KEY: ${GRAFANA_SECRET_KEY}
      GF_SECURITY_LOGIN_REMEMBER_DAYS: 1
      GF_SECURITY_COOKIE_SECURE: "true"
      GF_SECURITY_COOKIE_SAMESITE: strict
      GF_SECURITY_DISABLE_GRAVATAR: "true"
      GF_SECURITY_DISABLE_BRUTE_FORCE_LOGIN_PROTECTION: "false"

      # Authentication
      GF_AUTH_ANONYMOUS_ENABLED: "false"
      GF_AUTH_DISABLE_LOGIN_FORM: "false"
      GF_AUTH_DISABLE_SIGNOUT_MENU: "false"

      # Users
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_USERS_ALLOW_ORG_CREATE: "false"
      GF_USERS_AUTO_ASSIGN_ORG: "true"
      GF_USERS_AUTO_ASSIGN_ORG_ROLE: "Viewer"

      # Server settings
      GF_SERVER_PROTOCOL: https
      GF_SERVER_CERT_FILE: /etc/grafana/ssl/grafana.crt
      GF_SERVER_CERT_KEY: /etc/grafana/ssl/grafana.key
      GF_SERVER_DOMAIN: grafana.logistics.internal
      GF_SERVER_ROOT_URL: https://grafana.logistics.internal

      # Disable features for security
      GF_ANALYTICS_REPORTING_ENABLED: "false"
      GF_ANALYTICS_CHECK_FOR_UPDATES: "false"
      GF_SNAPSHOTS_EXTERNAL_ENABLED: "false"

    volumes:
      - grafana-data:/var/lib/grafana
      - type: bind
        source: ./grafana/ssl
        target: /etc/grafana/ssl
        read_only: true

# =============================================================================
# SECRETS MANAGEMENT
# =============================================================================

secrets:
  postgres_password:
    file: ./secrets/postgres_password.txt
  redis_password:
    file: ./secrets/redis_password.txt
  jwt_secret:
    file: ./secrets/jwt_secret.txt
  grafana_admin_password:
    file: ./secrets/grafana_admin_password.txt
  grafana_secret_key:
    file: ./secrets/grafana_secret_key.txt

# =============================================================================
# SECURITY NETWORK CONFIGURATION
# =============================================================================

networks:
  logistics-net:
    driver: bridge
    driver_opts:
      com.docker.network.bridge.name: "logistics-secure"
      com.docker.network.driver.mtu: 1500
      com.docker.network.bridge.enable_ip_masquerade: "true"
      com.docker.network.bridge.enable_icc: "false"  # Disable inter-container communication
    ipam:
      driver: default
      config:
        - subnet: 172.30.0.0/16
          gateway: 172.30.0.1
    internal: false
    attachable: false

# =============================================================================
# VOLUME SECURITY
# =============================================================================

volumes:
  postgres-data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /opt/logistics/data/postgres

  redis-data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /opt/logistics/data/redis

  prometheus-data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /opt/logistics/data/prometheus

  grafana-data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /opt/logistics/data/grafana
# =============================================================================
# Docker Compose Production Override
# Optimized for production deployment with security and performance
# =============================================================================

version: '3.8'

services:

  # ---------------------------------------------------------------------------
  # JavaFX Desktop Application (VNC mode for remote access)
  # ---------------------------------------------------------------------------
  logistics-desktop:
    build:
      context: ..
      dockerfile: Dockerfile.desktop
      target: gui-runtime
      args:
        BUILD_DATE: "${BUILD_DATE:-$(date -u +'%Y-%m-%dT%H:%M:%SZ')}"
        GIT_COMMIT: "${GIT_COMMIT:-unknown}"
        GIT_BRANCH: "${GIT_BRANCH:-main}"
        VERSION: "${VERSION:-1.0.0}"
    image: logistics/desktop-app:${VERSION:-latest}
    container_name: logistics-desktop-app
    ports:
      - "5900:5900"  # VNC access
    environment:
      JAVA_OPTS: >-
        -XX:+UseContainerSupport
        -XX:MaxRAMPercentage=75.0
        -XX:+ExitOnOutOfMemoryError
        -Djava.security.egd=file:/dev/./urandom
    networks:
      - logistics-net
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: '0.5'
        reservations:
          memory: 512M
          cpus: '0.25'
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp
      - /var/tmp
    labels:
      com.logistics.service: "desktop-app"
      com.logistics.component: "ui"

  # ---------------------------------------------------------------------------
  # API Gateway - Production optimized
  # ---------------------------------------------------------------------------
  api-gateway:
    deploy:
      resources:
        limits:
          memory: 768M
          cpus: '0.5'
        reservations:
          memory: 384M
          cpus: '0.25'
    environment:
      SPRING_PROFILES_ACTIVE: "production"
      JAVA_OPTS: >-
        -XX:+UseContainerSupport
        -XX:MaxRAMPercentage=70.0
        -XX:+ExitOnOutOfMemoryError
        -XX:+UseG1GC
        -XX:G1HeapRegionSize=16m
        -XX:+UseStringDeduplication
        -Djava.security.egd=file:/dev/./urandom
        -Dspring.jmx.enabled=false
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp
      - /var/cache
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ---------------------------------------------------------------------------
  # Company Service - Production optimized
  # ---------------------------------------------------------------------------
  company-service:
    deploy:
      resources:
        limits:
          memory: 768M
          cpus: '0.5'
        reservations:
          memory: 384M
          cpus: '0.25'
    environment:
      SPRING_PROFILES_ACTIVE: "production"
      JAVA_OPTS: >-
        -XX:+UseContainerSupport
        -XX:MaxRAMPercentage=70.0
        -XX:+ExitOnOutOfMemoryError
        -XX:+UseG1GC
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp

  # ---------------------------------------------------------------------------
  # Site Service - Production optimized
  # ---------------------------------------------------------------------------
  site-service:
    deploy:
      resources:
        limits:
          memory: 768M
          cpus: '0.5'
        reservations:
          memory: 384M
          cpus: '0.25'
    environment:
      SPRING_PROFILES_ACTIVE: "production"
      JAVA_OPTS: >-
        -XX:+UseContainerSupport
        -XX:MaxRAMPercentage=70.0
        -XX:+ExitOnOutOfMemoryError
        -XX:+UseG1GC
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp

  # ---------------------------------------------------------------------------
  # Calculation Service - Production optimized
  # ---------------------------------------------------------------------------
  calculation-service:
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: '0.75'  # More CPU for calculations
        reservations:
          memory: 512M
          cpus: '0.5'
    environment:
      SPRING_PROFILES_ACTIVE: "production"
      JAVA_OPTS: >-
        -XX:+UseContainerSupport
        -XX:MaxRAMPercentage=70.0
        -XX:+ExitOnOutOfMemoryError
        -XX:+UseG1GC
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp

  # ---------------------------------------------------------------------------
  # Dashboard Service - Production optimized
  # ---------------------------------------------------------------------------
  dashboard-service:
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.5'
        reservations:
          memory: 256M
          cpus: '0.25'
    environment:
      SPRING_PROFILES_ACTIVE: "production"
      JAVA_OPTS: >-
        -XX:+UseContainerSupport
        -XX:MaxRAMPercentage=70.0
        -XX:+ExitOnOutOfMemoryError
        -XX:+UseG1GC
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp

  # ---------------------------------------------------------------------------
  # PostgreSQL - Production tuned
  # ---------------------------------------------------------------------------
  postgres:
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: '1.0'
        reservations:
          memory: 512M
          cpus: '0.5'
    environment:
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD}"
      POSTGRES_USER: "${POSTGRES_USER:-logistics}"
      # Performance tuning
      POSTGRES_SHARED_PRELOAD_LIBRARIES: "pg_stat_statements"
      POSTGRES_MAX_CONNECTIONS: "200"
      POSTGRES_SHARED_BUFFERS: "256MB"
      POSTGRES_EFFECTIVE_CACHE_SIZE: "512MB"
    command: >
      postgres
      -c shared_preload_libraries=pg_stat_statements
      -c pg_stat_statements.track=all
      -c max_connections=200
      -c shared_buffers=256MB
      -c effective_cache_size=512MB
      -c maintenance_work_mem=64MB
      -c checkpoint_completion_target=0.9
      -c wal_buffers=16MB
      -c default_statistics_target=100
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "3"

  # ---------------------------------------------------------------------------
  # Redis - Production tuned
  # ---------------------------------------------------------------------------
  redis:
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.5'
        reservations:
          memory: 256M
          cpus: '0.25'
    command: >
      redis-server
        --maxmemory 384mb
        --maxmemory-policy allkeys-lru
        --save 300 1
        --tcp-keepalive 60
        --timeout 300
        --requirepass ${REDIS_PASSWORD:-}

  # ---------------------------------------------------------------------------
  # Kafka - Production tuned
  # ---------------------------------------------------------------------------
  kafka:
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: '1.0'
        reservations:
          memory: 512M
          cpus: '0.5'
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9093,PLAINTEXT_HOST://localhost:9092
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_NUM_PARTITIONS: 6
      KAFKA_LOG_RETENTION_HOURS: 168
      KAFKA_LOG_SEGMENT_BYTES: 1073741824
      KAFKA_LOG_RETENTION_CHECK_INTERVAL_MS: 300000
      KAFKA_HEAP_OPTS: "-Xmx512m -Xms512m"

  # ---------------------------------------------------------------------------
  # ZooKeeper - Production tuned
  # ---------------------------------------------------------------------------
  zookeeper:
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.5'
        reservations:
          memory: 256M
          cpus: '0.25'
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
      ZOOKEEPER_SYNC_LIMIT: 2
      ZOOKEEPER_HEAP_SIZE: "256M"

# ---------------------------------------------------------------------------
# Global network configuration
# ---------------------------------------------------------------------------
networks:
  logistics-net:
    driver: bridge
    name: logistics-production
    driver_opts:
      com.docker.network.bridge.name: "logistics0"
    ipam:
      config:
        - subnet: 172.20.0.0/16
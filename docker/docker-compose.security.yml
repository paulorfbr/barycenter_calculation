# =============================================================================
# Docker Compose Security Configuration
# Hardened security settings for production environments
# =============================================================================

version: '3.8'

services:

  # ---------------------------------------------------------------------------
  # API Gateway - Security hardened
  # ---------------------------------------------------------------------------
  api-gateway:
    security_opt:
      - no-new-privileges:true
      - seccomp:unconfined
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
    read_only: true
    tmpfs:
      - /tmp:noexec,nosuid,size=100m
      - /var/cache:noexec,nosuid,size=50m
    ulimits:
      nproc: 65535
      nofile:
        soft: 65535
        hard: 65535
    sysctls:
      net.core.somaxconn: 1024
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider",
             "http://localhost:8090/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    labels:
      - "com.docker.security.apparmor=unconfined"
      - "com.logistics.security.level=high"

  # ---------------------------------------------------------------------------
  # Company Service - Security hardened
  # ---------------------------------------------------------------------------
  company-service:
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    read_only: true
    tmpfs:
      - /tmp:noexec,nosuid,size=100m
    ulimits:
      nproc: 32768
      nofile:
        soft: 32768
        hard: 32768
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider",
             "http://localhost:8091/actuator/health/readiness"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 90s

  # ---------------------------------------------------------------------------
  # Site Service - Security hardened
  # ---------------------------------------------------------------------------
  site-service:
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    read_only: true
    tmpfs:
      - /tmp:noexec,nosuid,size=100m
    ulimits:
      nproc: 32768
      nofile:
        soft: 32768
        hard: 32768
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider",
             "http://localhost:8092/actuator/health/readiness"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 90s

  # ---------------------------------------------------------------------------
  # Calculation Service - Security hardened
  # ---------------------------------------------------------------------------
  calculation-service:
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    read_only: true
    tmpfs:
      - /tmp:noexec,nosuid,size=200m  # More temp space for calculations
    ulimits:
      nproc: 32768
      nofile:
        soft: 32768
        hard: 32768
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider",
             "http://localhost:8093/actuator/health/readiness"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 90s

  # ---------------------------------------------------------------------------
  # Dashboard Service - Security hardened
  # ---------------------------------------------------------------------------
  dashboard-service:
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    read_only: true
    tmpfs:
      - /tmp:noexec,nosuid,size=100m
    ulimits:
      nproc: 32768
      nofile:
        soft: 32768
        hard: 32768
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider",
             "http://localhost:8094/actuator/health/readiness"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  # ---------------------------------------------------------------------------
  # PostgreSQL - Security hardened
  # ---------------------------------------------------------------------------
  postgres:
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - SETUID
      - SETGID
      - DAC_OVERRIDE
    read_only: false  # Database requires write access
    tmpfs:
      - /tmp:noexec,nosuid,size=100m
      - /var/run/postgresql:noexec,nosuid,size=50m
    ulimits:
      nproc: 65535
      nofile:
        soft: 65535
        hard: 65535
    sysctls:
      vm.overcommit_memory: 2
      vm.overcommit_ratio: 80
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-logistics} -d postgres"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    environment:
      # Security settings
      POSTGRES_INITDB_ARGS: "--auth-local=scram-sha-256 --auth-host=scram-sha-256"

  # ---------------------------------------------------------------------------
  # Redis - Security hardened
  # ---------------------------------------------------------------------------
  redis:
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    read_only: true
    tmpfs:
      - /tmp:noexec,nosuid,size=50m
    ulimits:
      nproc: 32768
      nofile:
        soft: 32768
        hard: 32768
    healthcheck:
      test: ["CMD", "redis-cli", "--no-auth-warning", "ping"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 15s
    command: >
      redis-server
        --maxmemory 384mb
        --maxmemory-policy allkeys-lru
        --save 300 1
        --tcp-keepalive 60
        --timeout 300
        --requirepass ${REDIS_PASSWORD:-}
        --protected-mode yes
        --bind 0.0.0.0
        --port 6379

  # ---------------------------------------------------------------------------
  # Kafka - Security hardened
  # ---------------------------------------------------------------------------
  kafka:
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    read_only: false  # Kafka requires write access for logs
    tmpfs:
      - /tmp:noexec,nosuid,size=100m
    ulimits:
      nproc: 65535
      nofile:
        soft: 65535
        hard: 65535
    healthcheck:
      test: ["CMD-SHELL", "kafka-topics --bootstrap-server localhost:9092 --list"]
      interval: 30s
      timeout: 15s
      retries: 5
      start_period: 60s

  # ---------------------------------------------------------------------------
  # ZooKeeper - Security hardened
  # ---------------------------------------------------------------------------
  zookeeper:
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    read_only: false  # ZooKeeper requires write access
    tmpfs:
      - /tmp:noexec,nosuid,size=50m
    ulimits:
      nproc: 32768
      nofile:
        soft: 32768
        hard: 32768
    healthcheck:
      test: ["CMD-SHELL", "echo ruok | nc localhost 2181 | grep imok"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  # ---------------------------------------------------------------------------
  # Zipkin - Security hardened
  # ---------------------------------------------------------------------------
  zipkin:
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    read_only: true
    tmpfs:
      - /tmp:noexec,nosuid,size=100m
    ulimits:
      nproc: 32768
      nofile:
        soft: 32768
        hard: 32768
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider",
             "http://localhost:9411/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  # ---------------------------------------------------------------------------
  # Prometheus - Security hardened
  # ---------------------------------------------------------------------------
  prometheus:
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    read_only: true
    tmpfs:
      - /tmp:noexec,nosuid,size=50m
    ulimits:
      nproc: 32768
      nofile:
        soft: 32768
        hard: 32768
    user: "65534:65534"  # nobody user
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider",
             "http://localhost:9090/-/healthy"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  # ---------------------------------------------------------------------------
  # Grafana - Security hardened
  # ---------------------------------------------------------------------------
  grafana:
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    read_only: false  # Grafana requires write access for plugins and data
    tmpfs:
      - /tmp:noexec,nosuid,size=100m
    ulimits:
      nproc: 32768
      nofile:
        soft: 32768
        hard: 32768
    user: "472:472"  # grafana user
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_SECURITY_DISABLE_GRAVATAR: "true"
      GF_SECURITY_COOKIE_SECURE: "true"
      GF_SECURITY_COOKIE_SAMESITE: "strict"
      GF_SECURITY_STRICT_TRANSPORT_SECURITY: "true"
      GF_SECURITY_CONTENT_TYPE_PROTECTION: "true"
      GF_SECURITY_X_CONTENT_TYPE_OPTIONS: "nosniff"
      GF_SECURITY_X_XSS_PROTECTION: "true"
      GF_LOG_LEVEL: "info"
      GF_ANALYTICS_REPORTING_ENABLED: "false"
      GF_ANALYTICS_CHECK_FOR_UPDATES: "false"
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider",
             "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

# ---------------------------------------------------------------------------
# Network security
# ---------------------------------------------------------------------------
networks:
  logistics-net:
    driver: bridge
    name: logistics-secure
    driver_opts:
      com.docker.network.bridge.name: "logistics-sec"
      com.docker.network.bridge.enable_icc: "false"
      com.docker.network.bridge.enable_ip_masquerade: "true"
      com.docker.network.bridge.host_binding_ipv4: "127.0.0.1"
    ipam:
      config:
        - subnet: 172.30.0.0/16
          gateway: 172.30.0.1